backend:
  name: github

  repo: protungtq/new8

  branch: main

  base_url: https://decap-auth.mobitungtq.workers.dev

  auth_endpoint: auth
media_folder: "public/uploads"

public_folder: "/uploads"

collections:

  - name: "posts"

    label: "Posts"

    folder: "src/content/posts"

    create: true

    slug: "{{slug}}"

    fields:

      - {
          label: "Title",
          name: "title",
          widget: "string"
        }

      - {
          label: "Description",
          name: "description",
          widget: "text"
        }

      - {
          label: "Date",
          name: "date",
          widget: "datetime"
        }

      - {
          label: "Image",
          name: "image",
          widget: "image"
        }

      - {
          label: "Tags",
          name: "tags",
          widget: "list"
        }

      - {
          label: "Body",
          name: "body",
          widget: "markdown"
        }