<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Studio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
      color: #111827;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      color: #111827;
    }

    .header p {
      margin-top: 8px;
      color: #6b7280;
      font-size: 15px;
    }

    .card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      border: 1px solid rgba(255,255,255,0.5);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #dbe3ee;
      background: white;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      transition: 0.2s ease;
      outline: none;
      font-family: inherit;
    }

    input:focus,
    textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
    }

    #description {
      min-height: 90px;
      resize: vertical;
    }

    #content {
      min-height: 420px;
      resize: vertical;
      line-height: 1.7;
      font-family: Consolas, monospace;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .toolbar button {
      border: none;
      background: #111827;
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
      font-size: 14px;
    }

    .toolbar button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .actions button {
      border: none;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .preview-btn {
      background: #111827;
      color: white;
    }

    .export-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }

    .actions button:hover {
      transform: translateY(-1px);
    }

    .preview {
      margin-top: 24px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 18px;
      padding: 22px;
      overflow-x: auto;
      white-space: pre-wrap;
      line-height: 1.8;
      font-family: Consolas, monospace;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 18px;
        border-radius: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 24px;
      }

      .toolbar {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 6px;
      }

      .toolbar button {
        white-space: nowrap;
      }

      #content {
        min-height: 320px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Markdown studio</h1>
    <p>Tạo bài viết markdown nhanh chóng, tối ưu cho blog và CMS.</p>
  </div>

  <div class="card">

    <div class="grid">

      <div class="field">
        <label>Title</label>
        <input type="text" id="title" />
      </div>

      <div class="field">
        <label>Date</label>
        <input type="date" id="date" />
      </div>

    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="description"></textarea>
    </div>

    <div class="field">
      <label>Thumbnail image</label>
      <input type="text" id="image" />
    </div>

    <div class="field">
      <label>Tags</label>
      <input type="text" id="tags" placeholder="Fortnite, Epic Games, Apple" />
    </div>

    <div class="field">
      <label>Nội dung bài viết</label>

      <div class="toolbar">
        <button onclick="insertText('**','**')">Bold</button>
        <button onclick="insertText('*','*')">Italic</button>
        <button onclick="insertPrefix('## ')">H2</button>
        <button onclick="insertPrefix('### ')">H3</button>
        <button onclick="insertImage()">Chèn ảnh</button>
        <button onclick="insertYoutube()">YouTube</button>
      </div>

      <textarea id="content"></textarea>
    </div>

    <div class="actions">
      <button class="preview-btn" onclick="generatePreview()">
        Xem markdown
      </button>

      <button class="export-btn" onclick="exportMarkdown()">
        Xuất file .md
      </button>
    </div>

    <div class="preview" id="preview"></div>

  </div>

</div>

<script>

const contentBox = document.getElementById('content');

function insertText(before, after) {
  const start = contentBox.selectionStart;
  const end = contentBox.selectionEnd;

  const selected = contentBox.value.substring(start, end);
  const replacement = before + selected + after;

  contentBox.setRangeText(replacement);
  contentBox.focus();
}

function insertPrefix(prefix) {
  const start = contentBox.selectionStart;
  const end = contentBox.selectionEnd;

  const selected = contentBox.value.substring(start, end);

  contentBox.setRangeText(prefix + selected);
  contentBox.focus();
}

function insertImage() {

  const url = prompt('Nhập link ảnh:');

  if (!url) return;

  const alt = prompt('Nhập ALT ảnh:', 'Image') || 'Image';

  const title = prompt('Nhập TITLE ảnh:', alt) || alt;

  const markdown = `\n![${alt}](${url} "${title}")\n`;

  const start = contentBox.selectionStart;
  const end = contentBox.selectionEnd;

  const text = contentBox.value;

  contentBox.value =
    text.substring(0, start) +
    markdown +
    text.substring(end);

  contentBox.focus();
}

function extractYoutubeId(url) {
  const regExp =
    /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/;

  const match = url.match(regExp);

  return match ? match[1] : null;
}

function insertYoutube() {

  const url = prompt('Dán link YouTube:');

  if (!url) return;

  const videoId = extractYoutubeId(url);

  if (!videoId) {
    alert('Link YouTube không hợp lệ');
    return;
  }

  const iframe =
`\n<iframe width="100%" height="500" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>\n`;

  const start = contentBox.selectionStart;
  const end = contentBox.selectionEnd;

  const text = contentBox.value;

  contentBox.value =
    text.substring(0, start) +
    iframe +
    text.substring(end);

  contentBox.focus();
}

function generateMarkdown() {

  const title = document.getElementById('title').value.trim();
  const description = document.getElementById('description').value.trim();
  const date = document.getElementById('date').value;
  const image = document.getElementById('image').value.trim();
  const tagsInput = document.getElementById('tags').value.trim();
  const content = document.getElementById('content').value.trim();

  const tags = tagsInput
    .split(',')
    .map(tag => tag.trim())
    .filter(tag => tag.length > 0);

  const tagLines = tags
    .map(tag => `  - ${tag}`)
    .join('\n');

  return `---
title: "${title}"
description: "${description}"
date: "${date}"

image: "${image}"

tags:
${tagLines}
---

${content}
`;
}

function generatePreview() {
  document.getElementById('preview').textContent = generateMarkdown();
}

function slugify(text) {
  return text
    .toLowerCase()
    .trim()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/đ/g, 'd')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function exportMarkdown() {

  const markdown = generateMarkdown();

  const title = document.getElementById('title').value.trim();

  const filename = slugify(title) || 'article';

  const blob = new Blob([markdown], {
    type: 'text/markdown'
  });

  const link = document.createElement('a');

  link.href = URL.createObjectURL(blob);
  link.download = filename + '.md';

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

/* SAMPLE */

document.getElementById('title').value =
  'Fortnite chính thức quay trở lại App Store toàn cầu';


document.getElementById('description').value =
  'Epic Games xác nhận Fortnite đã quay trở lại App Store trên iPhone và iPad sau nhiều năm vắng bóng.';


document.getElementById('date').value = '2026-05-20';


document.getElementById('image').value =
  'https://game8.vn/media/202307/images/2007-Fortnite-1.jpg';


document.getElementById('tags').value =
  'Fortnite, Epic Games, Apple, iOS';


generatePreview();

</script>

</body>
</html>
