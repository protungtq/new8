    .toolbar button.btn-success:hover { background: #a7f3d0; }

    .preview-btn { background: #4b5563; color: white; }

<script>
const today = new Date();
const yyyy = today.getFullYear();
const mm = String(today.getMonth() + 1).padStart(2, '0');
const dd = String(today.getDate()).padStart(2, '0');
const formattedToday = `${yyyy}-${mm}-${dd}`;

let currentHours = String(today.getHours()).padStart(2, '0');
let currentMinutes = String(today.getMinutes()).padStart(2, '0');
let currentSeconds = String(today.getSeconds()).padStart(2, '0');

const contentBox = document.getElementById('content');

function execCmd(command) {
  document.execCommand(command, false, null);
  saveToStorage();
  contentBox.focus();
}

function execFormat(tag) {
  document.execCommand('formatBlock', false, `<${tag}>`);
  saveToStorage();
  contentBox.focus();
}

function handleHyperlink() {
  const selection = window.getSelection();
  let selectedNode = selection.anchorNode;
  if (!selectedNode) return;
  if (selectedNode.nodeType === 3) selectedNode = selectedNode.parentNode;

  const existingLink = selectedNode.closest('a');
  let defaultUrl = existingLink ? existingLink.getAttribute('href') : "";

  const url = prompt("Nhập hoặc sửa liên kết URL:", defaultUrl || "https://");
  if (url === null) return;

  if (url.trim() === "") {
    if (existingLink) existingLink.outerHTML = existingLink.innerHTML;
  } else {
    document.execCommand("createLink", false, url);
  }
  saveToStorage();
  generatePreview();
  contentBox.focus();
}

function clearAllHyperlinks() {
  if (!confirm("Bạn có chắc chắn muốn xóa toàn bộ liên kết (Hyperlink) ẩn trong bài viết không?")) return;
  contentBox.querySelectorAll('a').forEach(link => link.outerHTML = link.innerHTML);
  saveToStorage();
  generatePreview();
  contentBox.focus();
}

function base64ToBlob(base64Data, contentType) {
  contentType = contentType || '';
  const sliceSize = 1024;
  const byteCharacters = atob(base64Data);
  const byteArrays = [];

  for (let offset = 0; offset < byteCharacters.length; offset += sliceSize) {
    const slice = byteCharacters.slice(offset, offset + sliceSize);
    const byteNumbers = new Array(slice.length);
    for (let i = 0; i < slice.length; i++) {
      byteNumbers[i] = slice.charCodeAt(i);
    }
    const byteArray = new Uint8Array(byteNumbers);
    byteArrays.push(byteArray);
  }
  return new Blob(byteArrays, {type: contentType});
}

contentBox.addEventListener('paste', async (e) => {
  const items = (e.clipboardData || e.originalEvent.clipboardData).items;
  let hasFileImage = false;
  for (let item of items) {
    if (item.type.indexOf("image") === 0) {
      e.preventDefault();
      const file = item.getAsFile();
      await uploadViaWorker(file, 'editor');
      hasFileImage = true;
    }
  }

  setTimeout(async () => {
    saveToStorage();
    await deepScanAndRehostAllImages();
  }, 300);
});

async function deepScanAndRehostAllImages() {
  const proxyUrl = document.getElementById('workerProxyUrl').value;
  const apiKey = document.getElementById('fiApiKey').value;
  const statusEl = document.getElementById('status-editor');
  
  let contentHtml = contentBox.innerHTML;
  contentHtml = contentHtml.replace(/!\[(.*?)\]\s*(<br.*?>|\n|\r)*\s*\((data:image\/.*?)\)/gi, '![$1]($3)');
  contentBox.innerHTML = contentHtml;

  let scanCount = 0;
  const tasks = [];

  const markdownBase64Regex = /!\[(.*?)\]\((data:image\/(jpeg|png|gif|jpg|webp);base64,([^"\s\)]+))([^\)]*)\)/gi;
  let match;
  
  while ((match = markdownBase64Regex.exec(contentHtml)) !== null) {
    const fullMarkdownText = match[0];
    const mimeType = `image/${match[3]}`;
    const base64Str = match[4].replace(/\s/g, ''); 
    const extension = match[3];
    
    tasks.push({
      type: 'text',
      rawText: fullMarkdownText,
      mimeType: mimeType,
      base64Str: base64Str,
      extension: extension
    });
  }

  const htmlImages = contentBox.querySelectorAll('img:not(.uploaded)');
  for (let img of htmlImages) {
    const src = img.getAttribute('src');
    if (!src || src.includes('freeimage.host')) {
      img.classList.add('uploaded');
      continue;
    }
    
    if (src.startsWith('data:image')) {
      const parts = src.split(',');
      const mimeType = parts[0].match(/:(.*?);/)[1];
      const base64Str = parts[1].replace(/\s/g, '');
      const extension = mimeType.split('/')[1] || 'jpg';
      tasks.push({ type: 'html', element: img, mimeType: mimeType, base64Str: base64Str, extension: extension });
    } else {
      tasks.push({ type: 'html', element: img, srcUrl: src.trim() });
    }
  }

  if (tasks.length === 0) return;

  statusEl.textContent = `⏳ Phát hiện ${tasks.length} ảnh cần xử lý Rehost tự động...`;

  for (let task of tasks) {
    scanCount++;
    if (task.type === 'html' && task.element) {
      task.element.classList.add('uploading');
    }

    try {
      const form = new FormData();
      form.append("key", apiKey);
      form.append("action", "upload");
      form.append("format", "json");

      if (task.base64Str) {
        const imageBlob = base64ToBlob(task.base64Str, task.mimeType);
        form.append("source", new File([imageBlob], `rehost.${task.extension}`, { type: task.mimeType }));
      } else if (task.srcUrl) {
        form.append("source", task.srcUrl);
      }

      const res = await fetch(proxyUrl, { method: "POST", body: form });
      const result = await res.json();

      if (result && result.status_code === 200) {
        const newUrl = result.image?.url || result.image?.display_url;
        
        if (task.type === 'text') {
          contentHtml = contentBox.innerHTML; 
          const freshImgHtml = `<img src="${newUrl}" class="uploaded" alt="Image" title="Image" />`;
          contentHtml = contentHtml.replace(task.rawText, freshImgHtml);
          contentBox.innerHTML = contentHtml;
        } else if (task.type === 'html' && task.element) {
          task.element.setAttribute('src', newUrl);
          task.element.classList.remove('uploading');
          task.element.classList.add('uploaded');
        }
        
        saveToStorage();
        generatePreview();
      } else {
        if (task.type === 'html' && task.element) task.element.classList.remove('uploading');
      }
    } catch (err) {
      if (task.type === 'html' && task.element) task.element.classList.remove('uploading');
      console.error("Lỗi Rehost:", err);
    }
  }

  statusEl.textContent = "✅ Hệ thống đã dọn dẹp và Rehost toàn bộ ảnh văn bản hoàn tất!";
  setTimeout(() => statusEl.textContent = "", 3000);
}

async function uploadViaWorker(file, target) {
  if (!file) return;
  const proxyUrl = document.getElementById('workerProxyUrl').value;
  const apiKey = document.getElementById('fiApiKey').value;
  const statusEl = target === 'image' ? document.getElementById('status-thumb') : document.getElementById('status-editor');
  
  statusEl.textContent = "⏳ Đang tải ảnh lên...";

  try {
    const form = new FormData();
    form.append("key", apiKey);
    form.append("action", "upload");
    form.append("format", "json");
    form.append("source", file);

    const res = await fetch(proxyUrl, { method: "POST", body: form });
    const result = await res.json();

    if (result && result.status_code === 200) {
      const newUrl = result.image?.url || result.image?.display_url;
      
      if (target === 'image') {
        document.getElementById('image').value = newUrl;
        statusEl.textContent = "✅ Nạp ảnh đại diện bài viết thành công!";
      } else {
        const imgHtml = `<img src="${newUrl}" class="uploaded" alt="Image" title="Image" />`;
        contentBox.focus();
        document.execCommand('insertHTML', false, imgHtml);
        statusEl.textContent = "✅ Đã tải và chèn ảnh thành công!";
        setTimeout(() => statusEl.textContent = "", 3000);
      }
      saveToStorage();
      generatePreview();
    } else {
      statusEl.textContent = "❌ Lỗi: Không thể đẩy ảnh lên kho lưu trữ.";
    }
  } catch (err) {
    statusEl.textContent = "❌ Lỗi kết nối thông qua Cloudflare Worker.";
    console.error(err);
  }
}

async function uploadUrlViaWorker() {
  const imageUrl = prompt("Nhập hoặc dán link ảnh nguồn cần Rehost:");
  if (!imageUrl || imageUrl.trim() === "") return;

  const proxyUrl = document.getElementById('workerProxyUrl').value;
  const apiKey = document.getElementById('fiApiKey').value;
  const statusEl = document.getElementById('status-editor');

  statusEl.textContent = "⏳ Đang gửi link ảnh sang hệ thống xử lý Rehost...";

  try {
    const form = new FormData();
    form.append("key", apiKey);
    form.append("action", "upload");
    form.append("format", "json");
    form.append("source", imageUrl.trim());

    const res = await fetch(proxyUrl, { method: "POST", body: form });
    const result = await res.json();

    if (result && result.status_code === 200) {
      const newUrl = result.image?.url || result.image?.display_url;
      const imgHtml = `<img src="${newUrl}" class="uploaded" alt="Image" title="Image" />`;
      contentBox.focus();
      document.execCommand('insertHTML', false, imgHtml);
      statusEl.textContent = "✅ Đã Rehost từ đường link URL thành công!";
      setTimeout(() => statusEl.textContent = "", 3000);
      saveToStorage();
      generatePreview();
    } else {
      statusEl.textContent = "⚠️ Link ảnh lỗi hoặc Server nguồn chặn cào dữ liệu.";
    }
  } catch (err) {
    statusEl.textContent = "❌ Gặp lỗi kết nối đường truyền proxy Worker.";
    console.error(err);
  }
}

function insertYoutube() {
  const url = prompt('Dán link YouTube:');
  if (!url) return;
  const regExp = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/;
  const match = url.match(regExp);
  const videoId = match ? match[1] : null;
  if (!videoId) { alert('Link YouTube không hợp lệ'); return; }
  const iframeHtml = `<iframe width="100%" height="400" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
  document.execCommand('insertHTML', false, iframeHtml);
  saveToStorage();
}

function htmlToMarkdown(html) {
  let div = document.createElement('div');
  div.innerHTML = html;
  let md = [];

  function convert(node) {
    if (node.nodeType === 3) return node.nodeValue;
    if (node.nodeType !== 1) return '';
    const tag = node.tagName.toLowerCase();

    if (tag === 'a') {
      if (node.querySelector('img')) {
        let internalImgMarkdown = '';
        node.childNodes.forEach(child => {
          if (child.tagName && child.tagName.toLowerCase() === 'img') internalImgMarkdown += convert(child);
        });
        return internalImgMarkdown;
      }
      const href = node.getAttribute('href') || '';
      let linkText = '';
      node.childNodes.forEach(child => { linkText += convert(child); });
      return linkText.trim() ? `[${linkText}](${href})` : '';
    }

    let childText = '';
    node.childNodes.forEach(child => { childText += convert(child); });

    switch (tag) {
      case 'h2': return `\n\n## ${childText.trim()}\n\n`;
      case 'h3': return `\n\n### ${childText.trim()}\n\n`;
      case 'strong':
      case 'b': return `**${childText}**`;
      case 'em':
      case 'i': return `*${childText}*`;
      case 'p':
      case 'div': return childText.trim() ? `\n\n${childText.trim()}\n\n` : '';
      case 'br': return '\n';
      case 'img':
        const src = node.getAttribute('src') || '';
        let alt = node.getAttribute('alt') || 'Image';
        alt = alt.replace(/[\[\]]/g, '');
        let title = node.getAttribute('title') || alt;
        title = title.replace(/"/g, '\\"');
        return `\n\n![${alt}](${src} "${title}")\n\n`;
      case 'iframe': return `\n\n${node.outerHTML}\n\n`;
      default: return childText;
    }
  }

  div.childNodes.forEach(node => { md.push(convert(node)); });
  return md.join('').replace(/\n{3,}/g, '\n\n').trim();
}

function generateMarkdown() {
  const rawTitle = document.getElementById('title').value.trim();
  const title = rawTitle.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
  
  const rawDescription = document.getElementById('description').value.trim();
  const description = rawDescription.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
  
  const dateInput = document.getElementById('date').value;
  const image = document.getElementById('image').value.trim();
  const tagsInput = document.getElementById('tags').value.trim();
  
  let finalDateTime = dateInput;
  if (dateInput) {
    const now = new Date();
    const inputDateObj = new Date(dateInput);
    
    let h = currentHours, m = currentMinutes, s = currentSeconds;
    if (now.toDateString() === inputDateObj.toDateString()) {
      h = String(now.getHours()).padStart(2, '0');
      m = String(now.getMinutes()).padStart(2, '0');
      s = String(now.getSeconds()).padStart(2, '0');
      currentHours = h; currentMinutes = m; currentSeconds = s;
    }
    finalDateTime = `${dateInput}T${h}:${m}:${s}+07:00`;
  }
  
  const contentHtml = contentBox.innerHTML;
  const contentMarkdown = htmlToMarkdown(contentHtml);

  const tags = tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag.length > 0);
  const tagLines = tags.length > 0 ? '\ntags:\n' + tags.map(tag => `  - "${tag.replace(/"/g, '\\"')}"`).join('\n') : '';

  return `---
title: "${title}"
description: "${description}"
date: "${finalDateTime}"
image: "${image}"${tagLines}
---

${contentMarkdown}`;
}

function generatePreview() {
  document.getElementById('preview').textContent = generateMarkdown();
}

function slugify(text) {
  return text.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

function exportMarkdown() {
  const markdown = generateMarkdown();
  const rawTitle = document.getElementById('title').value.trim();
  const filename = slugify(rawTitle) || 'article';
  const blob = new Blob([markdown], { type: 'text/markdown' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename + '.md';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  clearStorage();
}

async function pushToGitHub() {
  const token = document.getElementById('ghToken').value.trim();
  if (!token) { alert('Vui lòng nhập GitHub Token!'); return; }
  const rawTitle = document.getElementById('title').value.trim();
  if (!rawTitle) { alert('Vui lòng nhập Tiêu đề!'); return; }

  const filename = (slugify(rawTitle) || 'article') + '.md';
  const path = `src/content/posts/${filename}`; 
  const markdownContent = generateMarkdown();
  const b64Content = btoa(unescape(encodeURIComponent(markdownContent)));
  const url = `https://api.github.com/repos/protungtq/new8/contents/${path}`;

  if(!confirm(`Đăng thẳng bài viết "${filename}" lên GitHub?`)) return;

  try {
    let sha = null;
    const checkRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
    if (checkRes.status === 200) {
      const fileData = await checkRes.json();
      sha = fileData.sha;
    }

    const bodyData = { message: `cms: dang bai "${rawTitle}"`, content: b64Content, branch: "main" };
    if (sha) bodyData.sha = sha;

    const pushRes = await fetch(url, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(bodyData)
    });

    if (pushRes.status === 201 || pushRes.status === 200) {
      alert(`🚀 Đăng thành công lên GitHub!`);
      saveToStorage(); 
      generatePreview();
    } else {
      const errData = await pushRes.json();
      alert(`Lỗi: ${errData.message}`);
    }
  } catch (error) {
    alert('Lỗi kết nối API GitHub.');
  }
}

function saveConfig() {
  localStorage.setItem('gh_studio_token', document.getElementById('ghToken').value);
}

function saveToStorage() {
  const data = {
    title: document.getElementById('title').value,
    date: document.getElementById('date').value,
    description: document.getElementById('description').value,
    image: document.getElementById('image').value,
    tags: document.getElementById('tags').value,
    content: contentBox.innerHTML,
    hours: currentHours,
    minutes: currentMinutes,
    seconds: currentSeconds
  };
  localStorage.setItem('md_studio_data', JSON.stringify(data));
}

function clearStorage() { localStorage.removeItem('md_studio_data'); }

function loadFromStorage() {
  const savedToken = localStorage.getItem('gh_studio_token');
  if (savedToken) document.getElementById('ghToken').value = savedToken;

  const savedData = localStorage.getItem('md_studio_data');
  if (savedData) {
    const data = JSON.parse(savedData);
    document.getElementById('title').value = data.title || '';
    document.getElementById('date').value = data.date || formattedToday;
    document.getElementById('description').value = data.description || '';
    document.getElementById('image').value = data.image || '';
    document.getElementById('tags').value = data.tags || '';
    contentBox.innerHTML = data.content || '';
    if (data.hours) {
      currentHours = data.hours;
      currentMinutes = data.minutes;
      currentSeconds = data.seconds;
    }
  } else {
    document.getElementById('date').value = formattedToday;
  }
  generatePreview();
}

loadFromStorage();
</script>
