<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Studio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
      color: #111827;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      color: #111827;
    }

    .header p {
      margin-top: 8px;
      color: #6b7280;
      font-size: 15px;
    }

    .card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      border: 1px solid rgba(255,255,255,0.5);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    input,
    textarea,
    .editor {
      width: 100%;
      border: 1px solid #dbe3ee;
      background: white;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      transition: 0.2s ease;
      outline: none;
      font-family: inherit;
    }

    input:focus,
    textarea:focus,
    .editor:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
    }

    #description {
      min-height: 90px;
      resize: vertical;
    }

    .editor {
      min-height: 420px;
      overflow-y: auto;
      line-height: 1.7;
    }
    
    .editor img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 10px 0;
      border-radius: 8px;
    }
    
    .editor iframe {
      max-width: 100%;
      margin: 10px 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .toolbar button {
      border: none;
      background: #111827;
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
      font-size: 14px;
    }

    .toolbar button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .actions button {
      border: none;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .preview-btn {
      background: #111827;
      color: white;
    }

    .export-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }

    .actions button:hover {
      transform: translateY(-1px);
    }

    .preview {
      margin-top: 24px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 18px;
      padding: 22px;
      overflow-x: auto;
      white-space: pre-wrap;
      line-height: 1.8;
      font-family: Consolas, monospace;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 18px;
        border-radius: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 24px;
      }

      .toolbar {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 6px;
      }

      .toolbar button {
        white-space: nowrap;
      }

      .editor {
        min-height: 320px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Markdown studio</h1>
    <p>Tạo bài viết markdown nhanh chóng, tối ưu cho blog và CMS.</p>
  </div>

  <div class="card">

    <div class="grid">

      <div class="field">
        <label>Title</label>
        <input type="text" id="title" />
      </div>

      <div class="field">
        <label>Date</label>
        <input type="date" id="date" />
      </div>

    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="description"></textarea>
    </div>

    <div class="field">
      <label>Thumbnail image</label>
      <input type="text" id="image" />
    </div>

    <div class="field">
      <label>Tags</label>
      <input type="text" id="tags" placeholder="Fortnite, Epic Games, Apple" />
    </div>

    <div class="field">
      <label>Nội dung bài viết</label>

      <div class="toolbar">
        <button onclick="execCmd('bold')">Bold</button>
        <button onclick="execCmd('italic')">Italic</button>
        <button onclick="execFormat('h2')">H2</button>
        <button onclick="execFormat('h3')">H3</button>
        <button onclick="insertImage()">Chèn ảnh</button>
        <button onclick="insertYoutube()">YouTube</button>
      </div>

      <div id="content" class="editor" contenteditable="true"></div>
    </div>

    <div class="actions">
      <button class="preview-btn" onclick="generatePreview()">
        Xem markdown
      </button>

      <button class="export-btn" onclick="exportMarkdown()">
        Xuất file .md
      </button>
    </div>

    <div class="preview" id="preview"></div>

  </div>

</div>

<script>
const contentBox = document.getElementById('content');

function execCmd(command) {
  document.execCommand(command, false, null);
  contentBox.focus();
}

function execFormat(tag) {
  document.execCommand('formatBlock', false, `<${tag}>`);
  contentBox.focus();
}

function insertImage() {
  const url = prompt('Nhập link ảnh:');
  if (!url) return;
  const alt = prompt('Nhập ALT ảnh:', 'Image') || 'Image';
  
  const imgHtml = `<img src="${url}" alt="${alt}" title="${alt}" />`;
  document.execCommand('insertHTML', false, imgHtml);
}

function extractYoutubeId(url) {
  const regExp = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/;
  const match = url.match(regExp);
  return match ? match[1] : null;
}

function insertYoutube() {
  const url = prompt('Dán link YouTube:');
  if (!url) return;

  const videoId = extractYoutubeId(url);
  if (!videoId) {
    alert('Link YouTube không hợp lệ');
    return;
  }

  const iframeHtml = `<iframe width="100%" height="400" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
  document.execCommand('insertHTML', false, iframeHtml);
}

// BỘ CHUYỂN ĐỔI HTML -> MARKDOWN NÂNG CẤP (XỬ LÝ LỖI KHỬ THẺ LINK BỌC ẢNH)
function htmlToMarkdown(html) {
  let div = document.createElement('div');
  div.innerHTML = html;

  let md = [];

  function convert(node) {
    if (node.nodeType === 3) {
      return node.nodeValue;
    }
    
    if (node.nodeType !== 1) return '';

    const tag = node.tagName.toLowerCase();

    // CHỦ ĐỘNG XỬ LÝ THẺ BỌC LINK <a> (ví dụ ảnh copy từ báo thường nằm trong thẻ <a>)
    if (tag === 'a') {
      // Nếu bên trong thẻ link có chứa thẻ ảnh img, bóc tách lấy nguyên ảnh, bỏ qua link text trùng lặp
      if (node.querySelector('img')) {
        let internalImgMarkdown = '';
        node.childNodes.forEach(child => {
          if (child.tagName && child.tagName.toLowerCase() === 'img') {
            internalImgMarkdown += convert(child);
          }
        });
        return internalImgMarkdown;
      }
      // Nếu là thẻ link text bình thường thì đưa về cấu trúc link markdown [Text](URL)
      const href = node.getAttribute('href') || '';
      let linkText = '';
      node.childNodes.forEach(child => { linkText += convert(child); });
      return linkText.trim() ? `[${linkText}](${href})` : '';
    }

    let childText = '';
    node.childNodes.forEach(child => {
      childText += convert(child);
    });

    switch (tag) {
      case 'h2': return `\n\n## ${childText.trim()}\n\n`;
      case 'h3': return `\n\n### ${childText.trim()}\n\n`;
      case 'strong':
      case 'b': return `**${childText}**`;
      case 'em':
      case 'i': return `*${childText}*`;
      case 'p':
      case 'div': 
        return childText.trim() ? `\n\n${childText.trim()}\n\n` : '';
      case 'br': return '\n';
      case 'img':
        const src = node.getAttribute('src') || '';
        let alt = node.getAttribute('alt') || 'Image';
        // Chuẩn hóa xóa bỏ các ký tự dấu ngoặc vuông vuông bị lỗi nếu có trong alt bài cũ
        alt = alt.replace(/[\[\]]/g, '');
        let title = node.getAttribute('title') || alt;
        title = title.replace(/"/g, '\\"'); // Tránh lỗi nháy kép trong thuộc tính title ảnh
        return `\n\n![${alt}](${src} "${title}")\n\n`;
      case 'iframe':
        return `\n\n${node.outerHTML}\n\n`;
      default:
        return childText;
    }
  }

  div.childNodes.forEach(node => {
    md.push(convert(node));
  });

  return md.join('')
    .replace(/\n{3,}/g, '\n\n')
    .replace(/\!\[(.*?)\]\((.*?)\)\s*\"(.*?)\"/g, '![$1]($2 "$3")') // Dọn dẹp khoảng cách thừa cú pháp ảnh
    .trim();
}

function generateMarkdown() {
  const rawTitle = document.getElementById('title').value.trim();
  const title = rawTitle.replace(/"/g, '\\"');
  const description = document.getElementById('description').value.trim().replace(/"/g, '\\"');
  
  const date = document.getElementById('date').value;
  const image = document.getElementById('image').value.trim();
  const tagsInput = document.getElementById('tags').value.trim();
  
  const contentHtml = contentBox.innerHTML;
  const contentMarkdown = htmlToMarkdown(contentHtml);

  const tags = tagsInput
    .split(',')
    .map(tag => tag.trim())
    .filter(tag => tag.length > 0);

  const tagLines = tags.length > 0 
    ? '\ntags:\n' + tags.map(tag => `  - ${tag}`).join('\n') 
    : '';

  return `---
title: "${title}"
description: "${description}"
date: "${date}"
image: "${image}"${tagLines}
---

${contentMarkdown}`;
}

function generatePreview() {
  document.getElementById('preview').textContent = generateMarkdown();
}

function slugify(text) {
  return text
    .toLowerCase()
    .trim()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/đ/g, 'd')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function exportMarkdown() {
  const markdown = generateMarkdown();
  const rawTitle = document.getElementById('title').value.trim();
  const filename = slugify(rawTitle) || 'article';

  const blob = new Blob([markdown], { type: 'text/markdown' });
  const link = document.createElement('a');

  link.href = URL.createObjectURL(blob);
  link.download = filename + '.md';

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

const today = new Date();
const yyyy = today.getFullYear();
const mm = String(today.getMonth() + 1).padStart(2, '0');
const dd = String(today.getDate()).padStart(2, '0');
const formattedToday = `${yyyy}-${mm}-${dd}`;

/* SAMPLE DATA */
document.getElementById('title').value = 'Hà Phi Yến chẳng cần bikini, một nụ cười đủ "gây bão" mạng.';
document.getElementById('description').value = 'Khoảnh khắc rạng rỡ của cô nàng đang nhận được "bão like" từ cộng đồng mạng.';
document.getElementById('date').value = formattedToday;
document.getElementById('image').value = 'https://gamek.mediacdn.vn/133514250583805952/2026/5/19/img8121-131017-1779176195578-1779176208135180404093.jpeg';
document.getElementById('tags').value = 'Hà Phi Yến, Hot Girl, Đời sống';

contentBox.innerHTML = '<div>Cộng đồng mạng mới đây lại một lần nữa đổ rầm rầm trước loạt ảnh mới nhất của cô nàng. Không cần trang phục quá cầu kỳ, chỉ một nụ cười tỏa nắng là đủ chiếm trọn mọi ánh nhìn.</div>';

generatePreview();
</script>

</body>
</html>
