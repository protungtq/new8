name: Deploy Website

on:
  push:
    branches:
      - main
  schedule:
    # Tự động chạy build 30 phút một lần
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        # SỬA LỖI TẠI ĐÂY: Thay đổi actions/node-env thành actions/setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build