media:
  input: public/images
  output: /images

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    filename: "{primary}.md"

    view:
      fields: [title, date]

    fields:
      - name: title
        label: Title
        type: string

      - name: description
        label: Description
        type: string

      - name: date
        label: Date
        type: date

      - name: image
        label: Thumbnail
        type: image

      - name: body
        label: Content
        type: rich-text